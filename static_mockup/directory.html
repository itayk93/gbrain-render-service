<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Septuagint Studies - Directory</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-content">
            <div class="logo-container">
                <div class="logo">S</div>
                <div class="search-bar">
                    <i data-lucide="search" style="width: 16px; color: var(--text-secondary)"></i>
                    <input type="text" placeholder="Search researchers, CFPs...">
                </div>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-item">
                    <i data-lucide="home" style="width: 20px; margin-bottom: 2px"></i>
                    <span>Home</span>
                </a>
                <div class="nav-item">
                    <i data-lucide="users" style="width: 20px; margin-bottom: 2px"></i>
                    <span>Network</span>
                </div>
                <a href="directory.html" class="nav-item active">
                    <i data-lucide="briefcase" style="width: 20px; margin-bottom: 2px"></i>
                    <span>Directory</span>
                </a>
                <div class="nav-item">
                    <i data-lucide="message-circle" style="width: 20px; margin-bottom: 2px"></i>
                    <span>Messaging</span>
                </div>
                <div class="nav-item">
                    <i data-lucide="bell" style="width: 20px; margin-bottom: 2px"></i>
                    <span>Notifications</span>
                </div>
                <a href="profile.html" class="nav-item">
                    <i data-lucide="user" style="width: 20px; margin-bottom: 2px"></i>
                    <span>Me</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container fade-in" style="padding-top: 24px">
        <div class="card" style="padding: 24px; margin-bottom: 24px">
            <h1 style="font-size: 24px; margin-bottom: 16px">Researchers Directory</h1>
            <div style="display: flex; gap: 12px">
                <div class="search-bar" style="flex: 1; height: 40px">
                    <i data-lucide="search" style="width: 20px; color: var(--text-secondary)"></i>
                    <input type="text" placeholder="Search by name, institution, or research focus...">
                </div>
                <button class="btn-secondary" style="display: flex; align-items: center; gap: 8px; height: 40px">
                    <i data-lucide="filter" style="width: 18px"></i> Filters
                </button>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px">
            <!-- Researcher Card -->
            <div class="card" style="text-align: center; padding: 24px">
                <div style="width: 100px; height: 100px; border-radius: 50%; overflow: hidden; margin: 0 auto 16px">
                    <img src="images/male.png" alt="James" style="width: 100%; height: 100%; object-fit: cover">
                </div>
                <h3 style="font-size: 18px; margin-bottom: 4px">Dr. James Aitken</h3>
                <p style="font-size: 14px; color: var(--text-main); margin-bottom: 4px">Professor of Hebrew and Old Testament</p>
                <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 12px">
                    <i data-lucide="map-pin" style="width: 12px; display: inline; vertical-align: middle"></i> University of Cambridge
                </p>
                <div style="display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin-bottom: 16px">
                    <span style="font-size: 10px; background-color: #f3f6f8; padding: 2px 8px; border-radius: 10px; color: var(--text-secondary)">Septuagint Lexicography</span>
                    <span style="font-size: 10px; background-color: #f3f6f8; padding: 2px 8px; border-radius: 10px; color: var(--text-secondary)">Hellenistic Greek</span>
                </div>
                <button class="btn-secondary" style="width: 100%">Connect</button>
            </div>

            <div class="card" style="text-align: center; padding: 24px">
                <div style="width: 100px; height: 100px; border-radius: 50%; overflow: hidden; margin: 0 auto 16px">
                    <img src="images/female.png" alt="Jennifer" style="width: 100%; height: 100%; object-fit: cover">
                </div>
                <h3 style="font-size: 18px; margin-bottom: 4px">Dr. Jennifer Dines</h3>
                <p style="font-size: 14px; color: var(--text-main); margin-bottom: 4px">Senior Research Fellow</p>
                <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 12px">
                    <i data-lucide="map-pin" style="width: 12px; display: inline; vertical-align: middle"></i> Heythrop College
                </p>
                <div style="display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin-bottom: 16px">
                    <span style="font-size: 10px; background-color: #f3f6f8; padding: 2px 8px; border-radius: 10px; color: var(--text-secondary)">The Septuagint</span>
                    <span style="font-size: 10px; background-color: #f3f6f8; padding: 2px 8px; border-radius: 10px; color: var(--text-secondary)">Prophetic Literature</span>
                </div>
                <button class="btn-secondary" style="width: 100%">Connect</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
