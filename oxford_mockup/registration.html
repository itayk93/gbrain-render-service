<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Network | Septuagint Studies Researchers Network</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background-color: var(--oxford-blue)">
    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh">
        <div class="card" style="width: 500px; padding: 50px; border-top: none">
            <div style="text-align: center; margin-bottom: 40px">
                <div class="brand" style="color: var(--oxford-blue); font-size: 32px; margin-bottom: 10px">SSRN</div>
                <h1 style="font-size: 28px; margin-bottom: 0">Create Researcher Account</h1>
                <p style="font-family: var(--font-serif); font-style: italic; color: var(--text-muted)">Join the global community of Septuagint scholars.</p>
            </div>

            <form>
                <div style="margin-bottom: 20px">
                    <label style="display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px">Full Name</label>
                    <input type="text" placeholder="Dr. Jane Smith" style="width: 100%; padding: 12px; border: 1px solid var(--border-color)">
                </div>
                <div style="margin-bottom: 20px">
                    <label style="display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px">University / Institution</label>
                    <input type="text" placeholder="University of Oxford" style="width: 100%; padding: 12px; border: 1px solid var(--border-color)">
                </div>
                <div style="margin-bottom: 20px">
                    <label style="display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px">Academic Email</label>
                    <input type="email" placeholder="jane.smith@ox.ac.uk" style="width: 100%; padding: 12px; border: 1px solid var(--border-color)">
                </div>
                <div style="margin-bottom: 30px">
                    <label style="display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px">Password</label>
                    <input type="password" placeholder="••••••••" style="width: 100%; padding: 12px; border: 1px solid var(--border-color)">
                </div>
                
                <button class="btn btn-blue" style="width: 100%; margin-bottom: 20px">Register Now</button>
                
                <div style="text-align: center; font-size: 14px; color: var(--text-muted)">
                    Already a member? <a href="#" style="font-weight: 700; text-decoration: underline">Log In</a>
                </div>
            </form>

            <div style="margin-top: 40px; text-align: center">
                <a href="index.html" style="font-size: 12px; opacity: 0.6">← Back to Billboard</a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
