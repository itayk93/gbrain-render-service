<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Septuagint Network</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-body">
    <div class="auth-card" style="max-width: 550px">
        <div style="text-align: center; margin-bottom: 30px">
            <div class="brand" style="color: var(--oxford-blue); font-size: 36px"><a href="index.html" style="color: inherit; text-decoration: none">SSRN</a></div>
        </div>
        <h1>Request Access</h1>
        <p>Join the global network of Septuagint scholars.</p>

        <form action="index.html">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" placeholder="Jane" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Smith" required>
                </div>
            </div>
            <div class="form-group">
                <label>University / Institution</label>
                <input type="text" placeholder="University of Oxford" required>
            </div>
            <div class="form-group">
                <label>Academic Email</label>
                <input type="email" placeholder="jane.smith@ox.ac.uk" required>
            </div>
            <div class="form-group">
                <label>Research Focus</label>
                <input type="text" placeholder="e.g. Textual Criticism, Lexicography" required>
            </div>
            
            <button type="submit" class="btn" style="width: 100%; padding: 15px; margin-top: 20px">Submit Request</button>
        </form>

        <div style="margin-top: 30px; text-align: center; font-size: 14px">
            Already have an account? <a href="login.html" style="color: var(--oxford-blue); font-weight: 700; text-decoration: underline">Log In</a>
        </div>
        
        <div style="margin-top: 40px; text-align: center">
            <a href="index.html" style="font-size: 11px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px">← Back to Billboard</a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
